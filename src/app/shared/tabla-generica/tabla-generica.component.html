<div class="overflow-x-auto">
  <table class="min-w-full divide-y divide-gray-200 text-sm">
    <thead class="bg-gray-50">
      <tr>
        <th
          *ngFor="let col of columnas"
          class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          {{ col }}
        </th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-100">
      <tr *ngFor="let fila of datos" class="hover:bg-gray-50 transition-colors">
        <td *ngFor="let col of columnas" class="px-4 py-3 text-gray-700">
          {{ fila[col] }}
        </td>
      </tr>
      <tr *ngIf="datos.length === 0">
        <td [attr.colspan]="columnas.length" class="px-4 py-6 text-center text-gray-400">
          Sin registros para mostrar.
        </td>
      </tr>
    </tbody>
  </table>
</div>
