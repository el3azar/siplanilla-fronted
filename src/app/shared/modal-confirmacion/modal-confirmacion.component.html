<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm">
    <h3 class="text-lg font-semibold text-gray-800 mb-2">{{ titulo }}</h3>
    <p class="text-sm text-gray-600 mb-6">{{ mensaje }}</p>
    <div class="flex justify-end gap-3">
      <button
        (click)="cancelado.emit()"
        class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">
        Cancelar
      </button>
      <button
        (click)="confirmado.emit()"
        class="px-4 py-2 text-sm text-white bg-blue-700 rounded-lg hover:bg-blue-800">
        Confirmar
      </button>
    </div>
  </div>
</div>
