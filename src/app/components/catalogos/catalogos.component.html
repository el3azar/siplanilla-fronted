<!-- Tabs -->
<div class="cat-tabs">
  @for (tab of tabs; track tab.id) {
    <button class="cat-tab" [class.cat-tab--active]="tabActivo() === tab.id"
            (click)="tabActivo.set(tab.id)">
      {{ tab.label }}
    </button>
  }
</div>

<!-- Contenido del tab -->
<div class="cat-content">
  <div class="page-toolbar">
    <p style="font-size:0.875rem;color:var(--muted-foreground);margin:0">
      {{ itemsActivos.length }} registros
    </p>
    <button class="btn btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      Agregar
    </button>
  </div>

  <div class="cat-list">
    @for (item of itemsActivos; track item) {
      <div class="cat-item">
        <span class="cat-item__label">{{ item }}</span>
        <div class="cat-item__actions">
          <button class="btn btn-outline btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="color:var(--accent-foreground)"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Z"/></svg>
          </button>
          <button class="btn btn-danger btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
          </button>
        </div>
      </div>
    }
  </div>
</div>
