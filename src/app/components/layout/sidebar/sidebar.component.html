<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">

  <!-- Logo -->
<div class="sidebar__logo">
  <img src="logo.png" alt="Sprintcode" class="sidebar__logo-img"/>
  @if (!collapsed()) {
    <div class="sidebar__logo-text">
      <p class="sidebar__logo-title">SiPlanilla SV</p>
      <p class="sidebar__logo-subtitle">Sistema RRHH</p>
    </div>
  }
</div>

  <!-- Nav -->
  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="nav-item--active"
         class="nav-item"
         [class.nav-item--collapsed]="collapsed()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="1.5" stroke="currentColor" class="nav-item__icon">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
        </svg>
        @if (!collapsed()) {
          <span class="nav-item__label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- Collapse toggle -->
  <div class="sidebar__footer">
    <button (click)="toggle()" class="sidebar__toggle" [title]="collapsed() ? 'Expandir' : 'Contraer'">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="2" stroke="currentColor" class="w-4 h-4 transition-transform"
           [class.rotate-180]="collapsed()">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
    </button>
  </div>

</aside>
