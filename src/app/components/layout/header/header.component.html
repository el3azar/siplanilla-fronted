<header class="header">

  <!-- Título de la página actual -->
  <h1 class="header__title">{{ pageTitle() }}</h1>

  <!-- Lado derecho: empresa + reloj + usuario + logout -->
  <div class="header__right">

    <div class="header__datetime">
      <span class="header__time">{{ currentTime() }}</span>
      <span class="header__date">{{ currentDate() }}</span>
    </div>

    <div class="header__divider"></div>

    <div class="header__user">
      <!-- Ícono persona -->
      <div class="header__avatar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="1.5" stroke="currentColor" class="header__avatar-icon">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
      </div>
      <div class="header__user-info">
        <span class="header__username">{{ username }}</span>
        <span class="header__company">{{ userRole }}</span>
      </div>
    </div>

    <div class="header__divider"></div>

    <!-- Botón cerrar sesión -->
    <button class="header__logout" title="Cerrar sesión" (click)="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="1.5" stroke="currentColor" class="header__logout-icon">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
      </svg>
      <span>Salir</span>
    </button>

  </div>
</header>
