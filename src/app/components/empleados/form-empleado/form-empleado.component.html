<div class="fe-header">
  <a [routerLink]="['/empleados']" class="btn btn-ghost btn-sm">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
    Volver
  </a>
  <h2 class="fe-header__title">Nuevo Empleado</h2>
</div>

<form (submit)="$event.preventDefault()" class="fe-form">

  <!-- Datos Personales -->
  <div class="card fe-section">
    <p class="section-label">Datos Personales</p>
    <div class="fe-grid">
      <div class="fe-field">
        <label class="form-label">Nombre(s) <span style="color:var(--destructive)">*</span></label>
        <input type="text" class="form-input" placeholder="Ej. Carlos Roberto" />
      </div>
      <div class="fe-field">
        <label class="form-label">Apellido(s) <span style="color:var(--destructive)">*</span></label>
        <input type="text" class="form-input" placeholder="Ej. Martínez Herrera" />
      </div>
      <div class="fe-field">
        <label class="form-label">DUI <span style="color:var(--destructive)">*</span></label>
        <input type="text" class="form-input" placeholder="00000000-0" />
      </div>
      <div class="fe-field">
        <label class="form-label">NIT</label>
        <input type="text" class="form-input" placeholder="0000-000000-000-0" />
      </div>
      <div class="fe-field">
        <label class="form-label">NUP</label>
        <input type="text" class="form-input" placeholder="NUP-000000000" />
      </div>
      <div class="fe-field">
        <label class="form-label">ISSS</label>
        <input type="text" class="form-input" placeholder="000000000" />
      </div>
      <div class="fe-field">
        <label class="form-label">Fecha de Nacimiento</label>
        <input type="date" class="form-input" />
      </div>
      <div class="fe-field">
        <label class="form-label">Sexo</label>
        <select class="form-select">
          <option value="">— Seleccione —</option>
          <option>Masculino</option>
          <option>Femenino</option>
        </select>
      </div>
      <div class="fe-field">
        <label class="form-label">Estado Civil</label>
        <select class="form-select">
          <option value="">— Seleccione —</option>
          <option>Soltero/a</option>
          <option>Casado/a</option>
          <option>Divorciado/a</option>
          <option>Viudo/a</option>
          <option>Unión no matrimonial</option>
        </select>
      </div>
      <div class="fe-field">
        <label class="form-label">Profesión / Oficio</label>
        <select class="form-select">
          <option value="">— Seleccione —</option>
          <option>Ingeniero en Sistemas</option>
          <option>Contador Público</option>
          <option>Licenciado en Administración</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Datos Laborales -->
  <div class="card fe-section">
    <p class="section-label">Datos Laborales</p>
    <div class="fe-grid">
      <div class="fe-field">
        <label class="form-label">Puesto de Trabajo <span style="color:var(--destructive)">*</span></label>
        <select class="form-select">
          <option value="">— Seleccione —</option>
          <option>Gerente General</option>
          <option>Desarrollador de Software</option>
          <option>Contador General</option>
        </select>
      </div>
      <div class="fe-field">
        <label class="form-label">Unidad Organizativa <span style="color:var(--destructive)">*</span></label>
        <select class="form-select">
          <option value="">— Seleccione —</option>
          <option>Gerencia General</option>
          <option>Gerencia de Recursos Humanos</option>
          <option>Área de Desarrollo de Software</option>
        </select>
      </div>
      <div class="fe-field">
        <label class="form-label">Fecha de Ingreso <span style="color:var(--destructive)">*</span></label>
        <input type="date" class="form-input" />
      </div>
      <div class="fe-field">
        <label class="form-label">Salario Base <span style="color:var(--destructive)">*</span></label>
        <input type="number" class="form-input" placeholder="0.00" step="0.01" />
      </div>
      <div class="fe-field">
        <label class="form-label">Correo Institucional</label>
        <input type="email" class="form-input" placeholder="nombre@corporacionempresarial.com.sv" />
      </div>
      <div class="fe-field">
        <label class="form-label">Correo Personal</label>
        <input type="email" class="form-input" placeholder="nombre@gmail.com" />
      </div>
      <div class="fe-field">
        <label class="form-label">Superior Inmediato</label>
        <select class="form-select">
          <option value="">— Sin superior —</option>
          <option>Martínez Herrera Carlos Roberto</option>
        </select>
      </div>
      <div class="fe-field" style="display:flex;align-items:center;gap:0.5rem;padding-top:1.5rem">
        <input type="checkbox" id="repLegal" style="width:1rem;height:1rem;cursor:pointer" />
        <label for="repLegal" style="font-size:0.875rem;cursor:pointer">Representante Legal</label>
      </div>
    </div>
  </div>

  <!-- Dirección -->
  <div class="card fe-section">
    <p class="section-label">Dirección</p>
    <div class="fe-grid">
      <div class="fe-field">
        <label class="form-label">Departamento</label>
        <select class="form-select">
          <option value="">— Seleccione —</option>
          <option>San Salvador</option>
          <option>Santa Ana</option>
          <option>San Miguel</option>
        </select>
      </div>
      <div class="fe-field">
        <label class="form-label">Municipio</label>
        <select class="form-select">
          <option value="">— Seleccione municipio —</option>
        </select>
      </div>
      <div class="fe-field fe-field--full">
        <label class="form-label">Calle / Avenida</label>
        <input type="text" class="form-input" placeholder="Ej. Calle Principal" />
      </div>
      <div class="fe-field fe-field--full">
        <label class="form-label">Colonia / Urb.</label>
        <input type="text" class="form-input" placeholder="Ej. Colonia Escalón" />
      </div>
      <div class="fe-field fe-field--full">
        <label class="form-label">Referencia</label>
        <input type="text" class="form-input" placeholder="Ej. Casa de color azul, frente al parque" />
      </div>
    </div>
  </div>

  <!-- Botones -->
  <div class="fe-footer">
    <a [routerLink]="['/empleados']" class="btn btn-outline">Cancelar</a>
    <button type="submit" class="btn btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 3.75H6.912a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H15M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859M12 3v8.25m0 0-3-3m3 3 3-3"/></svg>
      Guardar Empleado
    </button>
  </div>

</form>
